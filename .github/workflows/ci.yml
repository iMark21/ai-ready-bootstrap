name: CI

on:
  push:
    branches:
      - develop
      - main
      - "feat/**"
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
  pull_request:
    branches:
      - develop
      - main

jobs:
  validate-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax — bin/sdd-harness
        run: bash -n bin/sdd-harness

      - name: Bash syntax — install.sh
        run: bash -n install.sh

      - name: Bash syntax — hooks
        run: |
          set -euo pipefail
          for f in templates/.ai/hooks/*.sh; do
            bash -n "$f"
          done

      - name: Installer smoke test
        shell: bash
        run: |
          set -euo pipefail
          bin_dir="$(mktemp -d)"
          bash install.sh --bin-dir "$bin_dir"
          test -x "$bin_dir/sdd-harness" -o -L "$bin_dir/sdd-harness"
          "$bin_dir/sdd-harness" --help >/dev/null
          "$bin_dir/sdd-harness" --version

      - name: Fresh install smoke test
        shell: bash
        run: |
          set -euo pipefail
          repo="$(mktemp -d)"
          git -C "$repo" init -q
          bin/sdd-harness init "$repo" --non-interactive --yes --no-git-hook

          # Canonical files
          test -f "$repo/.ai/ROUTING.md"
          test -f "$repo/.ai/PRODUCT.md"
          test -f "$repo/.ai/CONTEXT.md"
          test -f "$repo/.ai/BACKLOG.md"
          test -f "$repo/.ai/README.md"
          test -f "$repo/.ai/adrs/0008-runtime-agnostic-ai-layer.md"
          test -f "$repo/.ai/agents/spec-writer.md"
          test -f "$repo/.ai/commands/spec.md"
          test -f "$repo/.ai/commands/story.md"
          test -f "$repo/.ai/commands/implement.md"
          test -f "$repo/.ai/commands/verify.md"
          test -f "$repo/.ai/commands/review.md"
          test -f "$repo/.ai/commands/release.md"
          test -f "$repo/.ai/commands/phase-close.md"
          test -f "$repo/.ai/hooks/config.sh"
          test -f "$repo/.ai/hooks/install.sh"
          test -f "$repo/.ai/hooks/pre-commit-spec-check.sh"
          test -f "$repo/.ai/notes/spec-driven-development.md"
          test -f "$repo/.ai/notes/governance-mirror.md"
          test -f "$repo/.ai/specs/PRD.md"
          test -f "$repo/.ai/specs/glossary.md"
          test -f "$repo/CLAUDE.md"
          test -f "$repo/AGENTS.md"

          # Placeholder substitution worked
          ! grep -q '{{PROJECT_NAME}}' "$repo/.ai/PRODUCT.md"
          ! grep -q '{{STORY_PREFIX}}' "$repo/.ai/BACKLOG.md"
          ! grep -q '{{TODAY}}' "$repo/.ai/CONTEXT.md"

      - name: Install refuses to overwrite existing AI files
        shell: bash
        run: |
          set -euo pipefail
          repo="$(mktemp -d)"
          touch "$repo/CLAUDE.md"
          git -C "$repo" init -q

          status=0
          bin/sdd-harness install "$repo" --non-interactive || status=$?
          test "$status" -ne 0
          test ! -d "$repo/.ai"

      - name: Standardize backs up existing AI files and installs fresh
        shell: bash
        run: |
          set -euo pipefail
          repo="$(mktemp -d)"
          mkdir -p "$repo/.ai"
          echo "stale" > "$repo/.ai/old.md"
          echo "stale" > "$repo/CLAUDE.md"
          git -C "$repo" init -q

          bin/sdd-harness standardize "$repo" --yes --no-git-hook

          # Backup created
          backup="$(find "$repo" -maxdepth 1 -type d -name '.ai-backup-*' | head -n 1)"
          test -n "$backup"
          test -d "$backup/.ai"
          test -f "$backup/CLAUDE.md"

          # Fresh .ai/ installed
          test -f "$repo/.ai/ROUTING.md"

      - name: --non-interactive fails fast on conflicts without --yes
        shell: bash
        run: |
          set -euo pipefail
          repo="$(mktemp -d)"
          touch "$repo/CLAUDE.md"
          git -C "$repo" init -q

          status=0
          bin/sdd-harness standardize "$repo" --non-interactive || status=$?
          test "$status" -ne 0

      - name: Unsupported runtime is rejected
        shell: bash
        run: |
          set -euo pipefail
          repo="$(mktemp -d)"
          git -C "$repo" init -q

          status=0
          bin/sdd-harness init "$repo" --runtimes lolwat --non-interactive --yes --no-git-hook || status=$?
          test "$status" -ne 0
          test ! -d "$repo/.ai"

      - name: init auto-routes between install and standardize
        shell: bash
        run: |
          set -euo pipefail
          repo="$(mktemp -d)"
          git -C "$repo" init -q

          # Fresh repo -> install
          bin/sdd-harness init "$repo" --non-interactive --yes --no-git-hook > "$repo/log1"
          grep -q "Routing to 'install'" "$repo/log1"

          # Now repo has AI files -> standardize
          bin/sdd-harness init "$repo" --yes --no-git-hook > "$repo/log2"
          grep -q "Routing to 'standardize'" "$repo/log2"

      - name: Dry-run never writes files
        shell: bash
        run: |
          set -euo pipefail
          repo="$(mktemp -d)"
          git -C "$repo" init -q
          bin/sdd-harness init "$repo" --dry-run --non-interactive --yes --no-git-hook
          test ! -d "$repo/.ai"
          test ! -f "$repo/CLAUDE.md"
          test ! -f "$repo/AGENTS.md"

      - name: --runtimes all installs every bootloader
        shell: bash
        run: |
          set -euo pipefail
          repo="$(mktemp -d)"
          git -C "$repo" init -q
          bin/sdd-harness init "$repo" --runtimes all --non-interactive --yes --no-git-hook
          test -f "$repo/CLAUDE.md"
          test -f "$repo/AGENTS.md"
          test -f "$repo/GEMINI.md"
          test -f "$repo/.github/copilot-instructions.md"
          test -f "$repo/.cursor/rules/sdd-harness.mdc"

      - name: Glob-sanity warns when no implementation surface exists
        shell: bash
        run: |
          set -euo pipefail
          repo="$(mktemp -d)"
          echo '# Docs-only repo' > "$repo/README.md"
          git -C "$repo" init -q
          git -C "$repo" add -A
          git -C "$repo" -c user.email=a@b.c -c user.name=t commit -qm init

          out="$(bin/sdd-harness init "$repo" --yes 2>&1)"
          echo "$out" | grep -q "the SDD pre-commit hook is mis-gated"
          echo "$out" | grep -q "SH_CODE_GLOBS"
          echo "$out" | grep -q "SH_CODE_EXCLUDE_GLOBS"
          test -f "$repo/.ai/BOOTSTRAP.md"
          grep -q '^\*\*Branch:\*\* `' "$repo/.ai/CONTEXT.md"
          ! grep -rq '{{GIT_BRANCH}}' "$repo/.ai"

      - name: Glob-sanity is silent on a conventional layout
        shell: bash
        run: |
          set -euo pipefail
          repo="$(mktemp -d)"
          mkdir -p "$repo/src"
          echo 'print()' > "$repo/src/main.py"
          git -C "$repo" init -q
          git -C "$repo" add -A
          git -C "$repo" -c user.email=a@b.c -c user.name=t commit -qm init

          out="$(bin/sdd-harness init "$repo" --yes 2>&1)"
          ! echo "$out" | grep -q "the SDD pre-commit hook is mis-gated"

      - name: Universal code surface covers nested, iOS, and Go layouts
        shell: bash
        run: |
          set -euo pipefail
          for path in "Marvel/app/src/X.kt" "MyApp/AppDelegate.swift" "cmd/server/main.go"; do
            repo="$(mktemp -d)"
            mkdir -p "$repo/$(dirname "$path")"
            echo 'initial' > "$repo/$path"
            git -C "$repo" init -q
            git -C "$repo" add -A
            git -C "$repo" -c user.email=a@b.c -c user.name=t commit -qm init

            out="$(bin/sdd-harness init "$repo" --yes 2>&1)"
            ! echo "$out" | grep -q "the SDD pre-commit hook is mis-gated"
            git -C "$repo" config core.hooksPath .git/hooks

            git -C "$repo" checkout -qb feature/probe
            echo 'change' >> "$repo/$path"
            git -C "$repo" add "$path"
            status=0
            git -C "$repo" -c user.email=a@b.c -c user.name=t commit -qm code-only || status=$?
            test "$status" -ne 0

            mkdir -p "$repo/.ai/specs"
            echo '# Spec' > "$repo/.ai/specs/PROBE-001.md"
            git -C "$repo" add "$path" ".ai/specs/PROBE-001.md"
            git -C "$repo" -c user.email=a@b.c -c user.name=t commit -qm spec-and-code
          done

      - name: Documentation-only feature commits are allowed
        shell: bash
        run: |
          set -euo pipefail
          repo="$(mktemp -d)"
          echo '# Project' > "$repo/README.md"
          git -C "$repo" init -q
          git -C "$repo" add -A
          git -C "$repo" -c user.email=a@b.c -c user.name=t commit -qm init

          bin/sdd-harness init "$repo" --yes >/dev/null 2>&1
          git -C "$repo" config core.hooksPath .git/hooks
          git -C "$repo" checkout -qb feature/docs
          echo 'More docs' >> "$repo/README.md"
          git -C "$repo" add README.md
          git -C "$repo" -c user.email=a@b.c -c user.name=t commit -qm docs-only

      - name: Selective --runtimes installs only the chosen bootloaders
        shell: bash
        run: |
          set -euo pipefail
          repo="$(mktemp -d)"
          git -C "$repo" init -q
          bin/sdd-harness init "$repo" --runtimes cursor --non-interactive --yes --no-git-hook
          test -f "$repo/.cursor/rules/sdd-harness.mdc"
          test ! -f "$repo/CLAUDE.md"
          test ! -f "$repo/AGENTS.md"
          test ! -f "$repo/GEMINI.md"
          test ! -f "$repo/.github/copilot-instructions.md"
