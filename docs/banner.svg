<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="sdd-harness — spec-driven development, runtime-agnostic">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1221"/>
      <stop offset="0.55" stop-color="#0E1A2B"/>
      <stop offset="1" stop-color="#0A1424"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="2" y="2" width="1196" height="296" rx="22" fill="url(#bg)" stroke="#1E2A40" stroke-width="1.5"/>
  <rect x="2" y="2" width="1196" height="150" rx="22" fill="url(#sheen)"/>

  <!-- SDD loop motif (right) -->
  <g transform="translate(1015 150)" opacity="0.85">
    <circle r="86" fill="none" stroke="#1F3147" stroke-width="10"/>
    <path d="M 0 -86 A 86 86 0 1 1 -74.5 43"
          fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <!-- arrowhead at the open end (~ -74.5, 43) -->
    <path d="M -74.5 43 l -16 -3 l 9 14 z" fill="#22D3EE"/>
    <!-- nodes -->
    <circle cx="0"   cy="-86" r="9" fill="#34D399"/>
    <circle cx="86"  cy="0"   r="9" fill="#2BD6BE"/>
    <circle cx="0"   cy="86"  r="9" fill="#22D3EE"/>
    <circle cx="-86" cy="0"   r="9" fill="#7C9CFF"/>
    <!-- node labels -->
    <text x="0"    y="-106" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" fill="#8B97A8">spec</text>
    <text x="126"  y="5"     text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" fill="#8B97A8">code</text>
    <text x="0"    y="116"   text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" fill="#8B97A8">verify</text>
    <text x="-128" y="5"     text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" fill="#8B97A8">merge</text>
  </g>

  <!-- wordmark -->
  <text x="74" y="158" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="94" font-weight="700" letter-spacing="-1">
    <tspan fill="url(#accent)">sdd</tspan><tspan fill="#5B6B82">·</tspan><tspan fill="#E6EDF3">harness</tspan>
  </text>

  <!-- accent rule -->
  <rect x="76" y="184" width="430" height="4" rx="2" fill="url(#accent)"/>

  <!-- tagline -->
  <text x="78" y="232" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="27" fill="#9AA6B8" letter-spacing="0.5">spec-driven development · runtime-agnostic</text>

  <!-- micro caption -->
  <text x="78" y="266" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="16" fill="#5B6B82">zero-dependency · bash + git · any AI runtime</text>
</svg>
